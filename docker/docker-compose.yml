version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: modus_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-modus}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    ports:
      - "5432:5432"
    networks:
      - modus_network

  redis:
    image: redis:7-alpine
    container_name: modus_redis
    ports:
      - "6379:6379"
    networks:
      - modus_network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: modus_app
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-modus}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - modus_network

volumes:
  postgres_data:

networks:
  modus_network:
    driver: bridge
